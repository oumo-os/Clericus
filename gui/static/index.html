<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clericus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{--gold:#c8a45e;--gl:#e8c97a;--bg:#0f1117;--sf:#1a1d27;--sf2:#242736;
    --bd:#2e3347;--tx:#e8eaf0;--mu:#8890a8;--gn:#4ade80;--rd:#f87171;
    --bl:#60a5fa;--am:#fbbf24;--fn:'Inter',-apple-system,sans-serif;
    --mo:'JetBrains Mono','Fira Code',monospace;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;min-height:100vh;}
  #root{display:flex;flex-direction:column;min-height:100vh;}
  /* Header */
  .hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 24px;height:56px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:-.3px;cursor:pointer;}
  .logo span{color:var(--mu);font-weight:400;font-size:13px;margin-left:8px;}
  .logo .proj{color:var(--tx);font-size:13px;margin-left:8px;}
  .hdr-r{display:flex;align-items:center;gap:12px;}
  .upd-badge{background:#1e1a0a;color:var(--am);border:1px solid var(--am);
    border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;}
  .pill{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid;}
  .p-idle{color:var(--mu);border-color:var(--bd);background:var(--sf2);}
  .p-run{color:var(--am);border-color:var(--am);background:#2a2010;animation:pulse 2s infinite;}
  .p-ok{color:var(--gn);border-color:var(--gn);background:#102010;}
  .p-err{color:var(--rd);border-color:var(--rd);background:#2a1010;}
  .p-cancel{color:var(--mu);border-color:var(--bd);background:var(--sf2);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  /* Layout */
  .main{display:grid;grid-template-columns:280px 1fr;flex:1;height:calc(100vh - 56px);overflow:hidden;}
  .sb{background:var(--sf);border-right:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column;}
  .ct{display:flex;flex-direction:column;overflow:hidden;}
  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--sf);}
  .tab{padding:12px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--mu);
    border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
  .tab:hover{color:var(--tx);}
  .tab.on{color:var(--gold);border-bottom-color:var(--gold);}
  /* Sidebar */
  .sb-sec{padding:14px 16px;border-bottom:1px solid var(--bd);}
  .sb-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mu);margin-bottom:10px;}
  /* Forms */
  label{display:block;font-size:12px;color:var(--mu);margin-bottom:4px;font-weight:500;}
  textarea,input,select{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;
    color:var(--tx);font-family:var(--fn);font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s;}
  textarea:focus,input:focus,select:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:72px;line-height:1.5;}
  select option{background:var(--sf2);}
  input[type=password]{font-family:var(--mo);}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;
    border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-g{background:var(--gold);color:#0f1117;}
  .btn-g:hover:not(:disabled){background:var(--gl);}
  .btn-d{background:#3a1515;color:var(--rd);border:1px solid var(--rd);}
  .btn-d:hover:not(:disabled){background:#4a1515;}
  .btn-o{background:var(--sf2);color:var(--tx);border:1px solid var(--bd);}
  .btn-o:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .btn-sm{padding:5px 10px;font-size:12px;}
  .btn-xs{padding:3px 8px;font-size:11px;}
  /* Files */
  .fi{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--sf2);border-radius:5px;margin-bottom:4px;}
  .fn{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .fsz{font-size:11px;color:var(--mu);flex-shrink:0;}
  .fdl{color:var(--mu);cursor:pointer;font-size:16px;flex-shrink:0;}
  .fdl:hover{color:var(--rd);}
  .dz{border:2px dashed var(--bd);border-radius:8px;padding:18px;text-align:center;
    cursor:pointer;transition:all .15s;color:var(--mu);font-size:12px;}
  .dz:hover,.dz.drag{border-color:var(--gold);color:var(--gold);background:#1e1a10;}
  /* Progress */
  .pw{background:var(--sf2);border-radius:4px;height:6px;overflow:hidden;margin:8px 0;}
  .pb{height:100%;background:var(--gold);border-radius:4px;transition:width .4s;}
  /* Tree */
  .tn{padding:5px 8px;border-radius:5px;margin-bottom:2px;cursor:pointer;display:flex;align-items:flex-start;gap:8px;}
  .tn:hover{background:var(--sf2);}
  .tn.sel{background:#1e1a10;}
  .td{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .td-ok{background:var(--gn);}
  .td-dr{background:var(--am);animation:pulse 1.5s infinite;}
  .td-no{background:var(--bd);}
  .tt{font-size:12px;line-height:1.4;}
  .tp{font-size:10px;color:var(--mu);}
  /* Log */
  .log{flex:1;overflow-y:auto;padding:16px;font-family:var(--mo);font-size:12px;line-height:1.6;color:#b0bec5;background:var(--bg);}
  .lerr{color:var(--rd);}
  .lwrn{color:var(--am);}
  /* Doc preview */
  .dv{flex:1;overflow-y:auto;padding:32px;max-width:820px;margin:0 auto;width:100%;}
  .dh0{font-size:24px;font-weight:700;margin-bottom:8px;line-height:1.3;}
  .dop{color:var(--mu);font-style:italic;margin-bottom:32px;line-height:1.6;}
  .dh1{font-size:18px;font-weight:700;color:var(--gold);margin:28px 0 10px;
    border-bottom:1px solid var(--bd);padding-bottom:6px;}
  .dh2{font-size:15px;font-weight:600;margin:20px 0 8px;}
  .dh3{font-size:13px;font-weight:600;color:var(--mu);margin:14px 0 6px;}
  .db{color:#c8cdd8;line-height:1.75;margin-bottom:12px;white-space:pre-wrap;font-size:13.5px;}
  .dcl{color:var(--mu);font-style:italic;margin-top:8px;font-size:13px;}
  .drf{margin-top:40px;padding-top:16px;border-top:1px solid var(--bd);}
  .drf h3{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;}
  .dr{font-size:12px;color:var(--mu);margin-bottom:4px;padding-left:16px;text-indent:-16px;}
  /* Export bar */
  .eb{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bd);background:var(--sf);flex-wrap:wrap;}
  /* Empty */
  .emp{display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex:1;gap:12px;color:var(--mu);padding:48px;text-align:center;}
  /* Alerts */
  .al{padding:10px 14px;border-radius:6px;font-size:12px;line-height:1.5;margin:8px 0;}
  .ae{background:#2a1010;color:var(--rd);border:1px solid #4a2020;}
  .ai{background:#101a2a;color:var(--bl);border:1px solid #1a3050;}
  .ao{background:#102010;color:var(--gn);border:1px solid #204020;}
  .aw{background:#2a2010;color:var(--am);border:1px solid #504020;}
  /* Checkbox */
  .ck{display:flex;align-items:center;gap:8px;}
  .ck input[type=checkbox]{width:auto;}
  /* Settings */
  .sp{flex:1;overflow-y:auto;padding:24px 32px;max-width:700px;}
  .sg{margin-bottom:26px;}
  .sgt{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;
    margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--bd);}
  .sr{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start;margin-bottom:12px;}
  .sl{font-size:13px;padding-top:8px;}
  .sh{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.4;}
  .kw{position:relative;}
  .kt{position:absolute;right:8px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--mu);cursor:pointer;font-size:12px;padding:2px 4px;}
  .kt:hover{color:var(--tx);}
  .fp{display:flex;gap:8px;}
  .fp input{flex:1;}
  .sdiv{height:1px;background:var(--bd);margin:18px 0;}
  /* Projects screen */
  .ps{flex:1;overflow-y:auto;padding:32px;max-width:760px;margin:0 auto;width:100%;}
  .ps-title{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px;}
  .ps-sub{color:var(--mu);margin-bottom:28px;font-size:13px;}
  .pcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;
    margin-bottom:12px;cursor:pointer;transition:border-color .15s;}
  .pcard:hover{border-color:var(--gold);}
  .pcard.active{border-color:var(--gold);background:#1a1a10;}
  .pc-name{font-size:15px;font-weight:600;margin-bottom:4px;}
  .pc-desc{font-size:12px;color:var(--mu);margin-bottom:10px;line-height:1.5;}
  .pc-meta{display:flex;gap:16px;font-size:11px;color:var(--mu);}
  .pc-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .pcs-ok{background:#102010;color:var(--gn);}
  .pcs-err{background:#2a1010;color:var(--rd);}
  .pcs-nr{background:var(--sf2);color:var(--mu);}
  .new-proj-form{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:24px;}
  .new-proj-form h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--tx);}
  /* Model badge */
  .mbadge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .mb-ok{background:#102010;color:var(--gn);}
  .mb-err{background:#2a1010;color:var(--rd);}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

const fmtB=b=>b<1024?`${b}B`:b<1048576?`${(b/1024).toFixed(1)}KB`:`${(b/1048576).toFixed(1)}MB`;
const fmtD=iso=>{if(!iso)return"—";const d=new Date(iso);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});};
const lc=l=>l.includes("ERROR")?"lerr":l.includes("WARN")?"lwrn":"";

async function api(m,p,b){
  const o={method:m,headers:{}};
  if(b&&!(b instanceof FormData)){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(b);}
  else if(b){o.body=b;}
  const r=await fetch(p,o);
  if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}
  return r.json();
}

const BACKENDS=[
  {v:"anthropic",l:"Anthropic Claude"},{v:"openai",l:"OpenAI"},
  {v:"gemini",l:"Google Gemini"},{v:"ollama",l:"Ollama (local)"},
  {v:"local",l:"llama-cpp (GGUF)"},
];

// ── Section tree ──────────────────────────────────────────────────────────

function TreeNode({node,depth=0,rs,sel,onSel}){
  const path=node.section_path||node.id||"";
  const done=!!(node.body_text||(node.children&&node.children.length));
  const cur=rs.current_section&&rs.current_section.includes(node.title);
  const dot=done?"td-ok":(cur&&rs.status==="running")?"td-dr":"td-no";
  return(
    <div>
      <div className={`tn${sel===path?" sel":""}`} style={{paddingLeft:8+depth*12}} onClick={()=>onSel(path,node)}>
        <div className={`td ${dot}`}/><div><div className="tt">{node.title}</div>{path&&<div className="tp">§{path}</div>}</div>
      </div>
      {(node.children||[]).map((c,i)=><TreeNode key={i} node={c} depth={depth+1} rs={rs} sel={sel} onSel={onSel}/>)}
    </div>
  );
}

// ── Doc preview ───────────────────────────────────────────────────────────

function DocSec({node,d=1}){
  const body=node.body_text||node.body||"";
  const cls=["dh1","dh2","dh3","dh3"][Math.min(d-1,3)];
  return(
    <div>
      <div className={cls}>{node.title}</div>
      {node.openning&&<p className="db" style={{fontStyle:"italic",opacity:.8}}>{node.openning}</p>}
      {body&&body.split("\n\n").map((p,i)=>p.trim()&&<p key={i} className="db">{p.trim()}</p>)}
      {(node.children||[]).map((c,i)=><DocSec key={i} node={c} d={d+1}/>)}
      {node.closing&&<p className="dcl">{node.closing}</p>}
    </div>
  );
}
function rstr(r){if(!r)return"";if(typeof r==="string")return r;
  return[r.author,r.year&&`(${r.year})`,r.title,r.filename&&`[${r.filename}]`].filter(Boolean).join(" ");}
function cRefs(n){const refs=[...(n.references||[])];for(const c of(n.children||[]))refs.push(...cRefs(c));
  const s=new Set();return refs.filter(r=>{const k=JSON.stringify(r);const ok=!s.has(k);s.add(k);return ok;});}

// ── Key field ─────────────────────────────────────────────────────────────

function KF({label,hint,name,s,set}){
  const[show,setShow]=useState(false);
  return(
    <div className="sr">
      <div><div className="sl">{label}</div><div className="sh">{hint}</div></div>
      <div className="kw">
        <input type={show?"text":"password"} value={s[name]||""} onChange={e=>set(name,e.target.value)}
          placeholder="Paste key…" autoComplete="off" spellCheck="false"/>
        <button className="kt" onClick={()=>setShow(v=>!v)}>{show?"hide":"show"}</button>
      </div>
    </div>
  );
}

// ── Settings tab ──────────────────────────────────────────────────────────

function Settings({onSaved}){
  const[s,setS]=useState({});
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  const[err,setErr]=useState("");
  const[model,setModel]=useState(null);
  const set=(k,v)=>setS(p=>({...p,[k]:v}));
  useEffect(()=>{
    api("GET","/api/settings").then(setS).catch(e=>setErr(e.message));
    api("GET","/api/model/validate").then(setModel).catch(()=>{});
  },[]);
  const save=async()=>{
    setSaving(true);setErr("");setSaved(false);
    try{await api("POST","/api/settings",s);setSaved(true);onSaved&&onSaved(s);setTimeout(()=>setSaved(false),3000);}
    catch(e){setErr(e.message);}finally{setSaving(false);}
  };
  const b=s.llm_backend||"ollama";
  return(
    <div className="sp">
      {err&&<div className="al ae">{err}</div>}
      {saved&&<div className="al ao">✓ Settings saved</div>}
      <div className="sg">
        <div className="sgt">LLM Backend</div>
        <div className="sr">
          <div><div className="sl">Active backend</div><div className="sh">AI model used for drafting</div></div>
          <select value={b} onChange={e=>set("llm_backend",e.target.value)}>
            {BACKENDS.map(x=><option key={x.v} value={x.v}>{x.l}</option>)}
          </select>
        </div>
      </div>
      {b==="anthropic"&&<div className="sg"><div className="sgt">Anthropic</div>
        <KF label="API Key" hint="From console.anthropic.com" name="anthropic_api_key" s={s} set={set}/>
        <div className="sr"><div><div className="sl">Model</div></div>
          <select value={s.anthropic_model||"claude-sonnet-4-6"} onChange={e=>set("anthropic_model",e.target.value)}>
            <option value="claude-opus-4-6">Claude Opus 4.6 (most capable)</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (recommended)</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (fastest)</option>
          </select>
        </div>
      </div>}
      {b==="openai"&&<div className="sg"><div className="sgt">OpenAI</div>
        <KF label="API Key" hint="From platform.openai.com" name="openai_api_key" s={s} set={set}/>
        <div className="sr"><div><div className="sl">Model</div></div>
          <select value={s.openai_model||"gpt-4o"} onChange={e=>set("openai_model",e.target.value)}>
            <option value="gpt-4o">GPT-4o (recommended)</option>
            <option value="gpt-4-turbo">GPT-4 Turbo</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
          </select>
        </div>
      </div>}
      {b==="gemini"&&<div className="sg"><div className="sgt">Google Gemini</div>
        <KF label="API Key" hint="From aistudio.google.com" name="gemini_api_key" s={s} set={set}/>
        <div className="sr"><div><div className="sl">Model</div></div>
          <select value={s.gemini_model||"gemini-2.0-flash"} onChange={e=>set("gemini_model",e.target.value)}>
            <option value="gemini-2.0-flash">Gemini 2.0 Flash (recommended)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
          </select>
        </div>
      </div>}
      {b==="ollama"&&<div className="sg"><div className="sgt">Ollama</div>
        <div className="sr"><div><div className="sl">Server URL</div><div className="sh">Default: http://localhost:11434</div></div>
          <input value={s.ollama_url||"http://localhost:11434"} onChange={e=>set("ollama_url",e.target.value)}/>
        </div>
        <div className="sr"><div><div className="sl">Model name</div><div className="sh">Must be pulled first</div></div>
          <input value={s.ollama_model||"llama3.2"} onChange={e=>set("ollama_model",e.target.value)} placeholder="llama3.2"/>
        </div>
        <div className="al ai">Install from <b>ollama.com</b>, then run <code>ollama pull llama3.2</code>.</div>
      </div>}
      {b==="local"&&<div className="sg"><div className="sgt">Local Model (llama-cpp)</div>
        <div className="sr">
          <div><div className="sl">GGUF model file</div><div className="sh">Select a .gguf file on your machine</div></div>
          <div className="fp">
            <input value={s.local_model_path||""} readOnly placeholder="No file selected…"/>
            <button className="btn btn-o btn-sm" onClick={()=>{
              if(window.pywebview){window.pywebview.api.pick_file(".gguf").then(p=>p&&set("local_model_path",p));}
              else{const p=prompt("Full path to .gguf file:");if(p)set("local_model_path",p);}
            }}>Browse…</button>
          </div>
        </div>
        {model&&<div className={`al ${model.ok?"ao":"ae"}`}>{model.message}</div>}
        <div className="al ai">Requires <code>llama-cpp-python</code>. Runs entirely on your machine.</div>
      </div>}
      <div className="sdiv"/>
      <div className="sg">
        <div className="sgt">Drafting Defaults</div>
        <div className="sr">
          <div><div className="sl">Max depth</div><div className="sh">Section nesting levels (1–5)</div></div>
          <input type="number" min={1} max={5} value={s.max_depth||3} onChange={e=>set("max_depth",parseInt(e.target.value)||3)}/>
        </div>
        <div className="sr">
          <div><div className="sl">Word budget</div><div className="sh">Total document target length</div></div>
          <input type="number" min={500} step={500} value={s.default_budget||3000} onChange={e=>set("default_budget",parseInt(e.target.value)||3000)}/>
        </div>
      </div>
      <div className="sdiv"/>
      <div className="sg">
        <div className="sgt">Updates</div>
        <div className="ck">
          <input type="checkbox" id="cu" checked={!!s.check_updates} onChange={e=>set("check_updates",e.target.checked)}/>
          <label htmlFor="cu" style={{marginBottom:0}}>Check for updates on startup</label>
        </div>
      </div>
      <button className="btn btn-g" onClick={save} disabled={saving} style={{marginTop:12}}>
        {saving?"Saving…":"Save Settings"}
      </button>
    </div>
  );
}

// ── Projects screen ───────────────────────────────────────────────────────

function Projects({onOpen}){
  const[projects,setProjects]=useState([]);
  const[creating,setCreating]=useState(false);
  const[form,setForm]=useState({name:"",description:"",instruction:""});
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const load=useCallback(async()=>{
    try{setProjects((await api("GET","/api/projects")).projects);}catch(e){setErr(e.message);}
  },[]);
  useEffect(()=>{load();},[]);

  const create=async()=>{
    if(!form.name.trim()){setErr("Project name is required.");return;}
    setLoading(true);setErr("");
    try{const p=await api("POST","/api/projects",form);onOpen(p);}
    catch(e){setErr(e.message);}finally{setLoading(false);}
  };

  const open=async id=>{
    setErr("");
    try{const p=await api("POST",`/api/projects/${id}/open`);onOpen(p);}
    catch(e){setErr(e.message);}
  };

  const del=async(e,id)=>{
    e.stopPropagation();
    if(!confirm("Delete this project and all its files? This cannot be undone."))return;
    try{await api("DELETE",`/api/projects/${id}`);load();}catch(e){setErr(e.message);}
  };

  const statusBadge=s=>{
    if(s==="complete")return<span className="pc-status pcs-ok">✓ Complete</span>;
    if(s==="error")return<span className="pc-status pcs-err">✗ Error</span>;
    return<span className="pc-status pcs-nr">Not run</span>;
  };

  return(
    <div className="ps">
      <div className="ps-title">Projects</div>
      <div className="ps-sub">Each project has its own sources, drafts and exports. Select one to open it.</div>
      {err&&<div className="al ae">{err}</div>}

      {/* New project form */}
      {creating?(
        <div className="new-proj-form">
          <h3>New Project</h3>
          <div style={{marginBottom:12}}>
            <label>Project name</label>
            <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
              placeholder="e.g. Q2 Market Analysis" autoFocus/>
          </div>
          <div style={{marginBottom:12}}>
            <label>Description <span style={{color:"var(--mu)",fontWeight:400}}>(optional)</span></label>
            <input value={form.description} onChange={e=>setForm({...form,description:e.target.value})}
              placeholder="A brief note about this project"/>
          </div>
          <div style={{marginBottom:16}}>
            <label>Document instruction <span style={{color:"var(--mu)"}}>— can be changed later</span></label>
            <textarea rows={2} value={form.instruction}
              onChange={e=>setForm({...form,instruction:e.target.value})}
              placeholder="e.g. A whitepaper on renewable energy incentives in Sub-Saharan Africa"/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-g" onClick={create} disabled={loading}>{loading?"Creating…":"Create Project"}</button>
            <button className="btn btn-o" onClick={()=>{setCreating(false);setForm({name:"",description:"",instruction:""});}}>Cancel</button>
          </div>
        </div>
      ):(
        <button className="btn btn-g" style={{marginBottom:24}} onClick={()=>setCreating(true)}>
          + New Project
        </button>
      )}

      {/* Project list */}
      {projects.length===0&&!creating&&(
        <div className="emp" style={{background:var("--sf"),borderRadius:10,padding:40}}>
          <div style={{fontSize:36,opacity:.3}}>📁</div>
          <div>No projects yet — create one to get started.</div>
        </div>
      )}
      {projects.map(p=>(
        <div key={p.id} className="pcard" onClick={()=>open(p.id)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div className="pc-name">{p.name}</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {statusBadge(p.last_status)}
              <button className="btn btn-d btn-xs" onClick={e=>del(e,p.id)}>Delete</button>
            </div>
          </div>
          {p.description&&<div className="pc-desc">{p.description}</div>}
          <div className="pc-meta">
            <span>📄 {p.source_count} source{p.source_count!==1?"s":""}</span>
            <span>Created {fmtD(p.created_at)}</span>
            {p.last_run&&<span>Last run {fmtD(p.last_run)}</span>}
            {p.has_draft&&<span style={{color:"var(--gn)"}}>✓ Draft available</span>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────

function App(){
  const[tab,setTab]=useState("setup");
  const[project,setProject]=useState(null);   // active project dict
  const[doc,setDoc]=useState(null);
  const[sources,setSources]=useState([]);
  const[logs,setLogs]=useState([]);
  const[rs,setRs]=useState({status:"idle",current_section:"",sections_done:0,sections_total:0});
  const[err,setErr]=useState("");
  const[drag,setDrag]=useState(false);
  const[upd,setUpd]=useState(null);
  const[selNode,setSelNode]=useState(null);
  const[form,setForm]=useState({instruction:"",llm_backend:"ollama",max_depth:3,format:"md",reset_state:false});
  const logRef=useRef(null);

  // On mount: check for active project from server, load settings, check updates
  useEffect(()=>{
    api("GET","/api/projects/active").then(r=>{
      if(r.active){
        setProject(r.active);
        if(r.active.document)setDoc(r.active.document);
        if(r.active.instruction)setForm(f=>({...f,instruction:r.active.instruction}));
      }
    }).catch(()=>{});
    api("GET","/api/settings").then(s=>{
      if(s.llm_backend)setForm(f=>({...f,llm_backend:s.llm_backend}));
      if(s.max_depth)setForm(f=>({...f,max_depth:s.max_depth}));
    }).catch(()=>{});
    api("GET","/api/update-check").then(u=>{if(u.update_available)setUpd(u);}).catch(()=>{});
  },[]);

  // Poll run status
  useEffect(()=>{
    const t=setInterval(async()=>{
      if(!project)return;
      try{const s=await api("GET","/api/run/status");setRs(s);if(s.document)setDoc(s.document);}catch(_){}
    },2000);
    return()=>clearInterval(t);
  },[project]);

  // WebSocket logs
  useEffect(()=>{
    const proto=location.protocol==="https:"?"wss:":"ws:";
    const ws=new WebSocket(`${proto}//${location.host}/ws/log`);
    ws.onmessage=e=>{
      try{const{line}=JSON.parse(e.data);setLogs(l=>[...l.slice(-499),line]);
        setTimeout(()=>logRef.current?.scrollTo(0,logRef.current.scrollHeight),50);}catch(_){}
    };
    return()=>ws.close();
  },[]);

  const loadSrc=useCallback(async()=>{
    if(!project)return;
    try{setSources((await api("GET","/api/sources")).files);}catch(_){}
  },[project]);
  useEffect(()=>{loadSrc();},[project]);

  const onOpen=p=>{
    setProject(p);
    if(p.instruction)setForm(f=>({...f,instruction:p.instruction}));
    if(p.document)setDoc(p.document);
    else setDoc(null);
    setSources([]);setLogs([]);
    setTab("setup");
  };

  const onSettingsSaved=s=>{
    if(s.llm_backend)setForm(f=>({...f,llm_backend:s.llm_backend}));
    if(s.max_depth)setForm(f=>({...f,max_depth:s.max_depth}));
  };

  const upload=async files=>{
    const fd=new FormData();[...files].forEach(f=>fd.append("files",f));
    try{await api("POST","/api/sources/upload",fd);loadSrc();}catch(e){setErr(e.message);}
  };
  const delSrc=async name=>{
    try{await api("DELETE",`/api/sources/${name}`);loadSrc();}catch(e){setErr(e.message);}
  };
  const start=async()=>{
    setErr("");setLogs([]);
    try{await api("POST","/api/run/start",form);setTab("progress");}catch(e){setErr(e.message);}
  };
  const cancel=async()=>{try{await api("POST","/api/run/cancel");}catch(_){}};
  const reset=async()=>{try{await api("POST","/api/state/reset");setDoc(null);}catch(e){setErr(e.message);}};
  const exp=fmt=>window.open(`/api/export/${fmt}`,"_blank");

  const pc=`pill p-${rs.status}`;
  const pi={idle:"○",running:"◉",complete:"✓",error:"✗",cancelled:"⊘"}[rs.status]||"○";
  const prog=rs.sections_total>0?Math.min(100,Math.round(rs.sections_done/rs.sections_total*100)):(rs.status==="running"?15:0);
  const bl=BACKENDS.find(b=>b.v===form.llm_backend)?.l||form.llm_backend;

  // ── No project open → show projects screen ──────────────────────────────
  if(!project){
    return(
      <>
        <div className="hdr">
          <div className="logo">Clericus</div>
          <div className="hdr-r">
            {upd&&<div className="upd-badge" onClick={()=>window.open(upd.release_url,"_blank")}>↑ v{upd.latest} available</div>}
            <button className="btn btn-o btn-sm" onClick={()=>setTab("settings")}>Settings</button>
          </div>
        </div>
        {tab==="settings"
          ?<div style={{flex:1,display:"flex",flexDirection:"column"}}>
            <div style={{padding:"12px 24px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:12}}>
              <button className="btn btn-o btn-sm" onClick={()=>setTab("projects")}>← Back</button>
              <span style={{fontSize:13,color:"var(--mu)"}}>Settings</span>
            </div>
            <Settings onSaved={onSettingsSaved}/>
          </div>
          :<Projects onOpen={onOpen}/>
        }
      </>
    );
  }

  // ── Project open → main UI ───────────────────────────────────────────────
  return(
    <>
      <div className="hdr">
        <div className="logo" onClick={()=>setProject(null)}>
          Clericus <span className="proj">/ {project.name}</span>
        </div>
        <div className="hdr-r">
          {upd&&<div className="upd-badge" onClick={()=>window.open(upd.release_url,"_blank")}>↑ v{upd.latest} available</div>}
          <div style={{fontSize:12,color:"var(--mu)"}}>{bl}</div>
          <div className={pc}>{pi} {rs.status}</div>
        </div>
      </div>

      <div className="main">
        {/* Sidebar */}
        <div className="sb">
          <div className="sb-sec">
            <div className="sb-ttl">Source Documents</div>
            <div className={`dz${drag?" drag":""}`}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);upload(e.dataTransfer.files);}}
              onClick={()=>window.document.getElementById("fi").click()}>
              Drop files here or click to browse<br/><small>PDF · DOCX · TXT · MD</small>
            </div>
            <input id="fi" type="file" multiple accept=".pdf,.docx,.txt,.md"
              style={{display:"none"}} onChange={e=>upload(e.target.files)}/>
            <div style={{marginTop:10}}>
              {sources.length===0
                ?<div style={{fontSize:12,color:"var(--mu)",textAlign:"center",padding:"8px 0"}}>No sources yet</div>
                :sources.map(f=>(
                  <div key={f.name} className="fi">
                    <div className="fn" title={f.name}>{f.name}</div>
                    <div className="fsz">{fmtB(f.size)}</div>
                    <div className="fdl" onClick={()=>delSrc(f.name)}>×</div>
                  </div>
                ))}
            </div>
          </div>
          {doc&&(
            <div className="sb-sec" style={{flex:1}}>
              <div className="sb-ttl">Structure</div>
              <TreeNode node={doc} rs={rs} sel={selNode?.path}
                onSel={(path,node)=>{setSelNode({path,node});setTab("preview");}}/>
            </div>
          )}
          {/* Switch project */}
          <div className="sb-sec" style={{marginTop:"auto"}}>
            <button className="btn btn-o btn-sm" style={{width:"100%"}} onClick={()=>setProject(null)}>
              ← All Projects
            </button>
          </div>
        </div>

        {/* Main content */}
        <div className="ct">
          <div className="tabs">
            {["setup","progress","preview","settings"].map(t=>(
              <div key={t} className={`tab${tab===t?" on":""}`} onClick={()=>setTab(t)}>
                {t.charAt(0).toUpperCase()+t.slice(1)}
                {t==="progress"&&rs.status==="running"&&" ●"}
              </div>
            ))}
          </div>

          {/* Setup */}
          {tab==="setup"&&(
            <div style={{padding:24,flex:1,overflowY:"auto"}}>
              {err&&<div className="al ae">{err}</div>}
              <div style={{marginBottom:16}}>
                <label>Document Goal / Instruction</label>
                <textarea rows={4} value={form.instruction}
                  onChange={e=>setForm({...form,instruction:e.target.value})}
                  placeholder="e.g. A whitepaper on renewable energy incentives…"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                <div>
                  <label>LLM Backend</label>
                  <select value={form.llm_backend} onChange={e=>setForm({...form,llm_backend:e.target.value})}>
                    {BACKENDS.map(b=><option key={b.v} value={b.v}>{b.l}</option>)}
                  </select>
                </div>
                <div>
                  <label>Export Format</label>
                  <select value={form.format} onChange={e=>setForm({...form,format:e.target.value})}>
                    <option value="md">Markdown</option>
                    <option value="docx">Word (DOCX)</option>
                    <option value="pdf">PDF</option>
                    <option value="html">HTML</option>
                    <option value="txt">Plain Text</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <label>Max Recursion Depth</label>
                <input type="number" min={1} max={5} value={form.max_depth}
                  onChange={e=>setForm({...form,max_depth:parseInt(e.target.value)||3})}/>
              </div>
              <div className="ck" style={{marginBottom:24}}>
                <input type="checkbox" id="rst" checked={form.reset_state}
                  onChange={e=>setForm({...form,reset_state:e.target.checked})}/>
                <label htmlFor="rst" style={{marginBottom:0}}>Reset state before running</label>
              </div>
              {sources.length===0
                ?<div className="al aw">Upload at least one source document to begin.</div>
                :<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <button className="btn btn-g" disabled={rs.status==="running"} onClick={start}>
                    {rs.status==="running"?"Running…":"▶  Start Draft"}
                  </button>
                  {rs.status!=="idle"&&<button className="btn btn-o" disabled={rs.status==="running"} onClick={reset}>Clear State</button>}
                </div>}
              {rs.status==="complete"&&<div className="al ao" style={{marginTop:16}}>✓ Draft complete — view in Preview</div>}
            </div>
          )}

          {/* Progress */}
          {tab==="progress"&&(
            <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
              <div style={{padding:"16px 20px",borderBottom:"1px solid var(--bd)",background:"var(--sf)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:13,color:"var(--mu)"}}>{rs.current_section||"Waiting…"}</div>
                  {rs.status==="running"&&<button className="btn btn-d btn-sm" onClick={cancel}>Cancel</button>}
                </div>
                <div className="pw"><div className="pb" style={{width:`${prog}%`}}/></div>
                {rs.error&&<div className="al ae">{rs.error}</div>}
                {rs.status==="complete"&&<div className="al ao">✓ Draft complete</div>}
              </div>
              <div className="log" ref={logRef}>
                {logs.length===0?<div style={{color:"var(--mu)"}}>Logs will appear here…</div>
                  :logs.map((l,i)=><div key={i} className={lc(l)}>{l}</div>)}
              </div>
            </div>
          )}

          {/* Preview */}
          {tab==="preview"&&(doc?(
            <>
              <div className="dv">
                <div className="dh0">{doc.title}</div>
                {doc.openning&&<div className="dop">{doc.openning}</div>}
                {(doc.children||[]).map((s,i)=><DocSec key={i} node={s} d={1}/>)}
                {(()=>{const refs=cRefs(doc);return refs.length>0?(
                  <div className="drf"><h3>References</h3>
                    {refs.map((r,i)=><div key={i} className="dr">{rstr(r)}</div>)}
                  </div>):null;})()}
              </div>
              <div className="eb">
                <span style={{fontSize:12,color:"var(--mu)",alignSelf:"center"}}>Export:</span>
                {["md","docx","pdf","html","txt"].map(f=>(
                  <button key={f} className="btn btn-o btn-sm" onClick={()=>exp(f)}>{f.toUpperCase()}</button>
                ))}
              </div>
            </>
          ):(
            <div className="emp"><div style={{fontSize:40,opacity:.4}}>📄</div>
              <div>No document yet. Add sources and run the pipeline.</div>
            </div>
          ))}

          {/* Settings */}
          {tab==="settings"&&<Settings onSaved={onSettingsSaved}/>}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
